<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfred Rico | Data Analysis Portfolio</title>

<link rel="icon" type="image/png" href="/web_icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

/* ================= BASE ================= */

body{
font-family:'Lato',sans-serif;
margin:0;
background:#1f2933;
scroll-behavior:smooth;
}

h2{
text-align:center;
margin-bottom:30px;
color:white;
}

/* ================= HERO ================= */

.hero{
position:relative;
height:32vh;
min-height:240px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
color:white;

background:
radial-gradient(circle at 20% 30%, rgba(120,120,120,.35), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(180,180,180,.25), transparent 45%),
linear-gradient(135deg,#020617,#111827 60%,#1f2933);
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 50% 80%,
rgba(200,200,200,0.25) 0%,
rgba(200,200,200,0.10) 25%,
transparent 60%);
}

.hero::after{
content:"";
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
}

#dashboardCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:.45;
z-index:2;
}

.hero-content{
position:relative;
z-index:3;
transform:translateY(-40px);
}

.hero h1{
font-size:38px;
font-family:'Playfair Display',serif;
margin-bottom:5px;
}

.social-links a{
color:white;
margin:0 10px;
font-size:22px;
}

/* ================= NAV ================= */

nav{
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

nav ul{
display:flex;
justify-content:center;
list-style:none;
padding:15px;
margin:0;
}

nav a{
text-decoration:none;
margin:0 12px;
color:#333;
font-weight:600;
}

/* ================= MAIN GRID ================= */

.main-layout{
max-width:1100px;
margin:60px auto;
padding:0 30px;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-areas:
"about contact"
"projects projects"
"certifications certifications";
gap:40px;
}

#about{grid-area:about}
#contact{grid-area:contact}
#projects{grid-area:projects}
#certifications{grid-area:certifications}

/* ================= ABOUT ================= */

.about-grid{
display:grid;
grid-template-columns:200px 1fr;
gap:30px;
}

.profile-pic{
width:180px;
height:180px;
object-fit:cover;
border-radius:50%;
border:4px solid #4a90e2;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:transform .3s ease;
}

.profile-pic:hover{
transform:scale(1.05);
}

.about-text{
position:relative;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.about-text::before{
content:"";
position:absolute;
left:-14px;
top:80px;
border-top:12px solid transparent;
border-bottom:12px solid transparent;
border-right:14px solid white;
}

.about-text p{
text-indent:20px;
line-height:1.7;
}

/* ================= CONTACT ================= */

.contact-form{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

.apple-send{
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:#111;
color:white;
cursor:pointer;
}

/* ================= FILTER BUTTONS ================= */

.project-filters,
.package-filters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.project-filters{margin-bottom:12px}
.package-filters{margin-bottom:25px}

.filter-btn{
padding:8px 14px;
border-radius:20px;
border:none;
background:#2f3a46;
color:white;
cursor:pointer;
font-size:13px;
transition:.25s;
}

.filter-btn.active{background:#4a90e2}

/* ================= PROJECTS ================= */

.projects-window{
max-width:920px;
margin:auto;
height:650px;
overflow-y:auto;
padding-right:8px;
}

.projects-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.project-card{
position:relative;
border-radius:16px;
overflow:hidden;
aspect-ratio:1;
cursor:pointer;
text-decoration:none;
color:inherit;
}

.project-card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s ease;
}

.project-card:hover img{
filter:blur(4px) brightness(.55);
transform:scale(1.08);
}

.project-overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:14px;
color:white;
background:linear-gradient(transparent,rgba(0,0,0,.85));
}

.project-overlay h3{
margin:0 0 6px;
font-size:17px;
}

.project-tags{
display:flex;
flex-wrap:wrap;
gap:6px;
font-size:12px;
}

.project-tags span{
padding:3px 8px;
border-radius:6px;
color:white;
font-weight:600;
}

.tag-package{background:#555}

/* ================= CERT ================= */

.cert-column{
display:flex;
justify-content:center;
}

.cert{
background:linear-gradient(145deg,#3a3a3c,#2c2c2e);
border-radius:14px;
padding:18px 20px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
max-width:220px;
transition:.25s ease;
color:white;
}

.cert:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:
0 22px 50px rgba(0,0,0,.55),
inset 0 1px 0 rgba(255,255,255,.12);
}

footer{
text-align:center;
padding:14px;
background:#111;
color:white;
}

/* ================= MOBILE ================= */

@media (max-width:900px){

.main-layout{
grid-template-columns:1fr;
grid-template-areas:
"about"
"contact"
"projects"
"certifications";
}

.about-grid{
grid-template-columns:1fr;
text-align:center;
}

.profile-pic{margin:auto}

.projects-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media (max-width:600px){

.hero h1{font-size:30px}

.projects-grid{
grid-template-columns:repeat(2,1fr);
}

.projects-window{
height:auto;
}

}

</style>
</head>

<body>

<header class="hero">

<canvas id="dashboardCanvas"></canvas>

<div class="hero-content">
<h1>Alfred Rico</h1>
<p>Aspiring Data Analyst</p>

<div class="social-links">
<a href="https://www.linkedin.com/in/alfred-rico-3992338a/" target="_blank"><i class="fab fa-linkedin"></i></a>
<a href="https://github.com/ShadyEggs" target="_blank"><i class="fab fa-github"></i></a>
</div>
</div>

</header>

<nav>
<ul>
<li><a href="#projects">Projects</a></li>
<li><a href="#certifications">Certifications</a></li>
</ul>
</nav>

<!-- CONTENT REMAINS IDENTICAL TO YOUR LAST WORKING VERSION -->

<script>

/* HERO DASHBOARD ANIMATION (RESTORED ORIGINAL) */

const canvas=document.getElementById("dashboardCanvas")
const ctx=canvas.getContext("2d")

let bars=[]
let particles=[]

const spacing=28
const barWidth=18

const palette=[
"rgba(52,152,219,.45)",
"rgba(26,188,156,.45)",
"rgba(160,160,160,.45)"
]

function setupCanvas(){

const hero=document.querySelector(".hero")

canvas.width=hero.offsetWidth
canvas.height=hero.offsetHeight

bars=[]
particles=[]

const count=Math.floor(canvas.width/spacing)
const totalWidth=count*spacing
const offsetX=(canvas.width-totalWidth)/2

for(let i=0;i<count;i++){

const h=Math.random()*120+60

bars.push({
x:offsetX+i*spacing,
height:h,
target:h,
color:palette[Math.floor(Math.random()*palette.length)]
})

}

for(let i=0;i<30;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*.4+.1
})
}

}

function randomizeBars(){
for(let i=0;i<6;i++){
const index=Math.floor(Math.random()*bars.length)
bars[index].target=Math.random()*120+60
}
}

setInterval(randomizeBars,5000)

function drawParticles(){

particles.forEach(p=>{

p.y-=p.speed

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}

ctx.fillStyle="rgba(255,255,255,.25)"
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

}

function drawRoundedRect(x,y,width,height,radius){

ctx.beginPath()
ctx.moveTo(x,y+radius)
ctx.lineTo(x,y+height)
ctx.lineTo(x+width,y+height)
ctx.lineTo(x+width,y+radius)
ctx.quadraticCurveTo(x+width,y,x+width-radius,y)
ctx.lineTo(x+radius,y)
ctx.quadraticCurveTo(x,y,x,y+radius)
ctx.fill()

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawParticles()

bars.forEach(bar=>{

bar.height+=(bar.target-bar.height)*0.05

ctx.fillStyle=bar.color

drawRoundedRect(
bar.x,
canvas.height-bar.height,
barWidth,
bar.height,
6
)

})

requestAnimationFrame(animate)

}

setupCanvas()
animate()

window.addEventListener("resize",setupCanvas)

</script>

</body>
</html>

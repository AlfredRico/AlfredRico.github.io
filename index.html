function setupCanvas(){

const hero=document.querySelector(".hero")

canvas.width=hero.offsetWidth
canvas.height=hero.offsetHeight

bars=[]
particles=[]

const count=Math.floor(canvas.width/spacing)
const totalWidth=count*spacing
const offsetX=(canvas.width-totalWidth)/2

/* SPIRAL GROUPING */

for(let i=0;i<count;i++){

const groupSize=4
const paletteIndex=Math.floor(i/groupSize)%palette.length

const color=palette[paletteIndex]

const h=Math.random()*120+60

bars.push({
x:offsetX+i*spacing,
height:h,
target:h,
baseColor:color
})

}

/* PARTICLES */

for(let i=0;i<0;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*.35+.1
})

}

}

function randomizeBars(){

for(let i=0;i<6;i++){

const index=Math.floor(Math.random()*bars.length)

bars[index].target=Math.random()*120+60

}

}

setInterval(randomizeBars,2000)

function drawParticles(){

particles.forEach(p=>{

p.y-=p.speed

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}

ctx.fillStyle="rgba(255,255,255,.22)"

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

}

function drawRoundedRect(x,y,w,h,r){

ctx.beginPath()

ctx.moveTo(x,y+r)
ctx.lineTo(x,y+h)
ctx.lineTo(x+w,y+h)
ctx.lineTo(x+w,y+r)

ctx.quadraticCurveTo(x+w,y,x+w-r,y)

ctx.lineTo(x+r,y)

ctx.quadraticCurveTo(x,y,x,y+r)

ctx.fill()

}

function drawGlassBar(bar){

const gradient=ctx.createLinearGradient(
bar.x,
canvas.height-bar.height,
bar.x,
canvas.height
)

gradient.addColorStop(0,hexToRGBA(bar.baseColor,.75))
gradient.addColorStop(.5,hexToRGBA(bar.baseColor,.45))
gradient.addColorStop(1,hexToRGBA(bar.baseColor,.25))

ctx.fillStyle=gradient

ctx.shadowColor=bar.baseColor
ctx.shadowBlur=12

drawRoundedRect(
bar.x,
canvas.height-bar.height,
barWidth,
bar.height,
6
)

ctx.shadowBlur=0

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawParticles()

bars.forEach(bar=>{

bar.height+=(bar.target-bar.height)*.06

drawGlassBar(bar)

})

requestAnimationFrame(animate)

}

setupCanvas()
animate()

const LANGUAGE_TOOLS={
python:["pandas","numpy","matplotlib","seaborn","scikit-learn"],
r:["dplyr","tidyr","ggplot2","plotly","caret"],
sql:["postgres","mysql","sqlite"],
tableau:["dashboard","viz"],
excel:["pivot","powerquery"],
sheets:["formulas","apps-script"]
}

const LANGUAGES=Object.keys(LANGUAGE_TOOLS)

const projects=[...document.querySelectorAll("#projects .project-card")]
const packageContainer=document.querySelector(".package-filters")

projects.forEach(card=>{
card.tags=card.dataset.tags.toLowerCase().split(" ")
})

let activeLanguages=[]
let activeTools=[]

function buildToolButtons(){

const previouslySelected = new Set(activeTools)

packageContainer.innerHTML=""

let tools=new Set()

activeLanguages.forEach(lang=>{
LANGUAGE_TOOLS[lang].forEach(tool=>{
tools.add(tool)
})
})

Array.from(tools).sort().forEach(tool=>{

const btn=document.createElement("button")

btn.className="filter-btn package-btn"
btn.dataset.filter=tool
btn.textContent=tool

if(previouslySelected.has(tool)){
btn.classList.add("active")
}

btn.onclick=()=>{

btn.classList.toggle("active")

activeTools=[...document.querySelectorAll(".package-btn.active")]
.map(b=>b.dataset.filter)

showProjects()

}

packageContainer.appendChild(btn)

})

activeTools=[...document.querySelectorAll(".package-btn.active")]
.map(b=>b.dataset.filter)

}

function showProjects(){

projects.forEach(card=>{

let languageMatch=
activeLanguages.length===0 ||
activeLanguages.every(lang=>card.tags.includes(lang))

let toolMatch=
activeTools.length===0 ||
activeTools.every(tool=>card.tags.includes(tool))

card.classList.toggle("hide",!(languageMatch && toolMatch))

})

}

document.querySelectorAll(".project-filters .filter-btn").forEach(btn=>{

btn.onclick=()=>{

const filter=btn.dataset.filter

const allBtn=document.querySelector('[data-filter="all"]')

if(filter==="all"){

activeLanguages=[]
activeTools=[]

document.querySelectorAll(".project-filters .filter-btn")
.forEach(b=>b.classList.remove("active"))

allBtn.classList.add("active")

packageContainer.innerHTML=""

showProjects()

return
}

/* deactivate ALL immediately */

allBtn.classList.remove("active")

btn.classList.toggle("active")

activeLanguages=[...document.querySelectorAll(".project-filters .filter-btn.active")]
.map(b=>b.dataset.filter)

/* remove ALL from activeLanguages */

activeLanguages=activeLanguages.filter(l=>l!=="all")

if(activeLanguages.length===0){

allBtn.classList.add("active")
packageContainer.innerHTML=""

}else{

buildToolButtons()

}

showProjects()

}

})

showProjects()
